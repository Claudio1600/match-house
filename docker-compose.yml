version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: matchhouse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchhouse
      POSTGRES_PASSWORD: matchhouse_secret
      POSTGRES_DB: matchhouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchhouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matchhouse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: matchhouse_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://matchhouse:matchhouse_secret@postgres:5432/matchhouse
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-key-minimum-32-characters
      JWT_REFRESH_SECRET: dev-refresh-secret-key-minimum-32chars
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:8081
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
